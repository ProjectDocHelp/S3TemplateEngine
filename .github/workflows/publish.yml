name: Publish npm Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the publish workflow without uploading to npm"
        required: true
        type: boolean
        default: true
      npm_tag:
        description: "npm dist-tag to publish under"
        required: true
        type: string
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for trusted publishing support
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run package dry-run checks
        run: npm run pack:check

      - name: Publish package
        env:
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          INPUT_NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}
        run: |
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            npm publish --access public --tag "$INPUT_NPM_TAG" --dry-run
          else
            npm publish --access public --tag "$INPUT_NPM_TAG"
          fi